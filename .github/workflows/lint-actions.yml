name: Lint actions
on:
  pull_request:
    paths:
      - ".github/workflows/**"

    branches:
      - "**"
jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: acryldata/sane-checkout-action@186e92cc5948a9c3e1cc7a96eaff9f776f3fc8e3 # v7
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          reporter: github-pr-review
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write
